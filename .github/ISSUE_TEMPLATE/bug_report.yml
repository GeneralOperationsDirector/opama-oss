name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        **Security vulnerabilities:** please do NOT open an issue — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        1. Went to Collections → Watches
        2. Clicked "Add item" and uploaded an image
        3. Expected a thumbnail; got a broken image icon
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`./opama.sh logs backend` output around the time of the error, or browser console errors. This is auto-formatted as code."
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD`
      placeholder: a28f2a6
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Host OS
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: input
    id: docker
    attributes:
      label: Docker version
      description: Output of `docker --version` / `docker compose version`
  - type: dropdown
    id: auth
    attributes:
      label: Auth provider
      options:
        - local (default)
        - firebase

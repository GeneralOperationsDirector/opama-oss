name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow that's awkward or missing today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Mockups/sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or how you work around it now.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Collections / custom assets
        - Storefront
        - Portfolio
        - Card grading
        - Pokémon TCG module
        - Plugins / module system
        - Setup / launcher / Docker
        - Documentation
        - Other
